name: Docker Build

on:
  workflow_call:
    outputs:
      image-ref:
        description: First image tag for scanning
        value: ${{ jobs.docker-build.outputs.image-ref }}
      image-tags:
        description: All image tags (newline-separated)
        value: ${{ jobs.docker-build.outputs.image-tags }}

permissions:
  contents: read

jobs:
  docker-build:
    name: Build & Export
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      image-ref: ${{ steps.set-image-ref.outputs.image }}
      image-tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USER }}/github-actions-dashboard
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image (export for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload image artifact for scanning
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

      - name: Set image reference output
        id: set-image-ref
        run: echo "image=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)" >> "$GITHUB_OUTPUT"
