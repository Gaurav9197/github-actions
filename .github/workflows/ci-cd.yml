name: Python CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # ─── Code Quality ──────────────────────────────────────────
  code-quality:
    if: github.event_name != 'schedule'
    uses: ./.github/workflows/code-quality.yml
    secrets: inherit

  # ─── Security Scans ────────────────────────────────────────
  sast-scan:
    uses: ./.github/workflows/sast-scan.yml
    secrets: inherit

  secrets-scan:
    uses: ./.github/workflows/secrets-scan.yml
    secrets: inherit

  dependency-scan:
    uses: ./.github/workflows/dependency-scan.yml
    secrets: inherit

  dependency-review:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/dependency-review.yml
    secrets: inherit

  dockerfile-scan:
    uses: ./.github/workflows/dockerfile-scan.yml
    secrets: inherit

  # ─── Pre-commit ────────────────────────────────────────────
  pre-commit:
    if: github.event_name != 'schedule'
    uses: ./.github/workflows/pre-commit.yml
    secrets: inherit

  # ─── Tests ─────────────────────────────────────────────────
  test:
    if: github.event_name != 'schedule'
    uses: ./.github/workflows/test.yml
    secrets: inherit

  # ─── Docker Build ──────────────────────────────────────────
  docker-build:
    needs: [code-quality, sast-scan, secrets-scan, dependency-scan, dockerfile-scan, test]
    uses: ./.github/workflows/docker-build.yml
    secrets: inherit

  # ─── Container Scan ────────────────────────────────────────
  container-scan:
    needs: [docker-build]
    uses: ./.github/workflows/container-scan.yml
    with:
      image-ref: ${{ needs.docker-build.outputs.image-ref }}
    secrets: inherit

  # ─── Docker Push ───────────────────────────────────────────
  docker-push:
    needs: [docker-build, container-scan]
    if: github.event_name == 'push'
    uses: ./.github/workflows/docker-push.yml
    with:
      image-tags: ${{ needs.docker-build.outputs.image-tags }}
    secrets: inherit

  # ─── Deploy ────────────────────────────────────────────────
  deploy:
    needs: [docker-push]
    if: github.event_name == 'push'
    uses: ./.github/workflows/deploy.yml
    secrets: inherit

  # ─── Security Summary ─────────────────────────────────────
  security-report:
    needs: [sast-scan, secrets-scan, dependency-scan, dockerfile-scan, container-scan]
    if: always()
    uses: ./.github/workflows/security-report.yml
    secrets: inherit
