name: Python CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write  # for Codecov PR comment and annotations

jobs:
  lint:
    name: Lint & Type Check (Ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Cache Ruff
        uses: actions/cache@v4
        with:
          path: ~/.cache/ruff
          key: ruff-${{ runner.os }}-${{ hashFiles('**/pyproject.toml', '**/.ruff.toml', '**/ruff.toml') }}
          restore-keys: ruff-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Ruff (lint)
        run: ruff check . --output-format=github

      - name: Run Ruff (format check)
        run: ruff format --check .

      - name: Run type checking
        run: mypy .

      - name: Run security scan
        run: bandit -r . --skip B104

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: pre-commit-${{ runner.os }}-

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          coverage run -m unittest discover
          coverage report --fail-under=80
          coverage xml -o coverage.xml

      - name: Upload coverage (Codecov) — PR annotations
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  dependency-scan:
    name: Dependency scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4

  docker:
    name: Docker build & push
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_SECRETS }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USER }}/github-actions-dashboard
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name != 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    needs: [docker]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push'
    concurrency:
      group: deploy-production
      cancel-in-progress: true

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            IMAGE="${{ vars.DOCKERHUB_USER }}/github-actions-dashboard:latest"
            CONTAINER="github-actions-dashboard"
            PORT="5000"

            echo "==> Logging in to Docker Hub"
            echo "${{ secrets.DOCKERHUB_SECRETS }}" | docker login -u "${{ vars.DOCKERHUB_USER }}" --password-stdin

            echo "==> Pulling latest image"
            docker pull "$IMAGE"

            echo "==> Saving previous image ID for rollback"
            OLD_IMAGE=$(docker inspect --format='{{.Image}}' "$CONTAINER" 2>/dev/null || echo "")

            echo "==> Stopping old container"
            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm "$CONTAINER" 2>/dev/null || true

            echo "==> Starting new container"
            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              -p "$PORT:5000" \
              "$IMAGE"

            echo "==> Waiting for health check"
            HEALTHY=false
            for i in $(seq 1 15); do
              if curl -sf "http://localhost:$PORT/api/status" > /dev/null 2>&1; then
                HEALTHY=true
                break
              fi
              echo "    Attempt $i/15 — waiting 2s..."
              sleep 2
            done

            if [ "$HEALTHY" = true ]; then
              echo "==> Deploy succeeded — container is healthy"
              docker logout
              exit 0
            fi

            echo "==> Health check failed — rolling back"
            docker logs "$CONTAINER" --tail 30

            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm "$CONTAINER" 2>/dev/null || true

            if [ -n "$OLD_IMAGE" ]; then
              echo "==> Restarting previous image"
              docker run -d \
                --name "$CONTAINER" \
                --restart unless-stopped \
                -p "$PORT:5000" \
                "$OLD_IMAGE"
              echo "==> Rollback complete"
            else
              echo "==> No previous image to roll back to"
            fi

            docker logout
            exit 1
