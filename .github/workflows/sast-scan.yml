name: SAST Scan

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  sast-scan:
    name: Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep scan
        run: semgrep scan --config auto --config p/security-audit --sarif -o semgrep.sarif --error

      - name: Upload Semgrep SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep.sarif
          retention-days: 30
