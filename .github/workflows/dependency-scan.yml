name: Dependency Scan

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  dependency-scan:
    name: pip-audit + Trivy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Verify dependency integrity
        run: |
          if ! grep -q '\-\-hash' requirements.txt 2>/dev/null; then
            echo "::warning::requirements.txt does not use hash pinning — vulnerable to supply chain attacks"
            echo "::warning::Generate locked requirements with: pip-compile --generate-hashes requirements.in"
          fi

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r requirements.txt --format json --output pip-audit-report.json || true

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: 'true'

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-dependency

      - name: Upload dependency scan reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-scan-reports
          path: |
            pip-audit-report.json
            trivy-fs.sarif
          retention-days: 30
