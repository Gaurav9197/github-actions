name: Docker Push

on:
  workflow_call:
    inputs:
      image-tags:
        description: Newline-separated image tags to push
        required: true
        type: string

permissions:
  contents: read

jobs:
  docker-push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/image.tar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_SECRETS }}

      - name: Push all tags to Docker Hub
        env:
          IMAGE_TAGS: ${{ inputs.image-tags }}
        run: |
          echo "$IMAGE_TAGS" | while IFS= read -r tag; do
            [ -n "$tag" ] && echo "Pushing $tag" && docker push "$tag"
          done
